# PropertyCore nginx server block
# Serves the config dashboard at /admin/ and proxies API + WebSocket
# to the propertycore-engine on localhost:8080.

server {
    listen 80 default_server;
    server_name _;

    # Redirect /admin → /admin/
    location = /admin {
        return 301 /admin/;
    }

    # React SPA — serve static files, fallback to index.html for client-side routing
    location /admin/ {
        alias /var/www/propertycore/;
        try_files $uri $uri/ /admin/index.html;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Engine REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Engine status + health probes
    location = /status {
        proxy_pass http://127.0.0.1:8080/status;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # WebSocket — live state updates to the dashboard
    location /ws {
        proxy_pass             http://127.0.0.1:8080/ws;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;
    }
}
