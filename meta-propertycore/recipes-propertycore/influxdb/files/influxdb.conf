### PropertyCore — InfluxDB configuration
### InfluxDB 1.8 running on PropertyCore Hub

# Disable anonymous usage reporting to influxdata.com
reporting-disabled = true

# bind-address = "127.0.0.1:8088"

[meta]
  dir = "/var/lib/influxdb/meta"

[data]
  dir = "/var/lib/influxdb/data"
  wal-dir = "/var/lib/influxdb/wal"

  # Limits total WAL size to 50MB (keeps footprint small on hub storage)
  wal-fsync-delay = "0s"
  max-series-per-database = 1000000
  max-values-per-tag = 100000

[coordinator]

[retention]
  enabled = true
  check-interval = "30m0s"

[shard-precreation]
  enabled = true
  check-interval = "10m0s"
  advance-period = "30m0s"

[monitor]
  store-enabled = false

[http]
  enabled = true
  bind-address = ":8086"
  auth-enabled = false
  log-enabled = false
  write-tracing = false
  pprof-enabled = false
  debug-pprof-enabled = false
  https-enabled = false

[logging]
  format = "logfmt"
  level = "warn"
  suppress-logo = true

[subscriber]
  enabled = false

[[graphite]]
  enabled = false

[[collectd]]
  enabled = false

[[opentsdb]]
  enabled = false

[[udp]]
  enabled = false

[continuous_queries]
  enabled = true
  log-enabled = false
  run-interval = "1s"
