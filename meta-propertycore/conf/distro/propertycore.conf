# PropertyCore Distribution Configuration
# Yocto Scarthgap (5.0 LTS)

DISTRO = "propertycore"
DISTRO_NAME = "PropertyCore OS"
DISTRO_VERSION = "0.1"
DISTRO_CODENAME = "foundation"

# Inherit the poky distro as base, then override what we need
require conf/distro/poky.conf

# SDK version
SDK_VERSION = "${DISTRO_VERSION}"

# Distro features — keep minimal for embedded commercial use
# - systemd: production service manager
# - pam: required for SSH and auth
# - opengl: needed for future LVGL/display work
# - wifi: hub has Wi-Fi capability
# - bluetooth: future BLE device support
DISTRO_FEATURES = "acl ext2 ipv4 ipv6 largefile usbhost xattr pam \
                   systemd usrmerge wifi bluetooth opengl"

# Use systemd as the init manager (not SysVinit)
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"

# Default timezone — can be overridden per deployment
DEFAULT_TIMEZONE = "Africa/Lagos"

# Package format — ipk is lightweight, suitable for embedded
PACKAGE_CLASSES = "package_ipk"

# Do not install recommended packages (keeps image lean)
NO_RECOMMENDATIONS = "1"

# Strip debug info from packages in the image (saves space)
INHIBIT_PACKAGE_DEBUG_SPLIT = "0"
