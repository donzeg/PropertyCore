# meta-propertycore layer configuration
# PropertyCore smart property automation platform layer

# Add this layer to BBPATH so BitBake can find it
BBPATH .= ":${LAYERDIR}"

# Add all recipes in this layer to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-propertycore"
BBFILE_PATTERN_meta-propertycore = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-propertycore = "10"

# Core layer dependency only — raspberrypi layer is optional (not required for QEMU builds)
LAYERDEPENDS_meta-propertycore = "core"

# Compatible with Yocto Scarthgap (5.0 LTS)
LAYERSERIES_COMPAT_meta-propertycore = "scarthgap"
